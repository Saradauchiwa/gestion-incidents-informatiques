{% extends "base.html" %}
{% block content %}

<h1>Utilisateurs</h1>

<a class="btn" href="{{ url_for('admin.creer_utilisateur') }}">+ Nouvel utilisateur</a>

<table>
    <tr>
        <th>Nom</th><th>Email</th><th>Role</th><th>Service</th><th>Actif</th><th></th>
    </tr>
    {% for u in utilisateurs %}
    <tr>
        <td>{{ u.prenom }} {{ u.nom }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td>{{ u.service }}</td>
        <td>{{ "Oui" if u.actif else "Non" }}</td>
        <td>
            <a class="btn" href="{{ url_for('admin.modifier_utilisateur', id_utilisateur=u.id_utilisateur) }}">Modifier</a>
            <form method="POST" action="{{ url_for('admin.basculer_actif', id_utilisateur=u.id_utilisateur) }}" style="display:inline;">
                <button type="submit" class="btn">{{ "Desactiver" if u.actif else "Activer" }}</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
